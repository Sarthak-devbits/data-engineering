version: '3.8'
services:
  postgres:
    container_name: xero_dataeng_db
    image: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: xero_user
      POSTGRES_PASSWORD: xero_pass
      POSTGRES_DB: xero_dataeng
    volumes:
      - postgres-data:/var/lib/postgresql   
    restart: unless-stopped
    networks:
      - pgnetwork

  pgadmin:
    container_name: xero_container-pgadmin
    image: dpage/pgadmin4
    depends_on:
      - postgres
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    restart: unless-stopped
    networks:
      - pgnetwork

volumes:
  postgres-data:

networks:
  pgnetwork:
    driver: bridge